<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Vivaah Creations | Maharaja Sapphire | Samarth & Ananya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050210; font-family: 'Montserrat', sans-serif; }
    .invitation-2 { max-width: 1300px; margin: 40px auto; background: radial-gradient(ellipse at 70% 30%, #1b0f3a, #03000f); border-radius: 60px 60px 40px 40px; border: 1px solid #a855f7; box-shadow: 0 40px 70px rgba(0,0,0,0.7); overflow: hidden; }
    .hero-2 { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 28px; }
    .glass-2 { background: rgba(25,12,55,0.7); backdrop-filter: blur(14px); border-radius: 70px 30px 70px 30px; padding: 3rem 2rem; max-width: 1000px; width: 100%; border: 1px solid #c084fc; text-align: center; }
    .purple { color: #c084fc; text-shadow: 0 0 6px #a855f7; }
    .photo-duo { display: flex; justify-content: center; gap: 35px; margin: 25px 0; }
    .photo-duo div { width: 140px; height: 140px; border-radius: 50%; overflow: hidden; border: 3px solid #c084fc; box-shadow: 0 0 30px #a855f7; }
    .photo-duo img { width: 100%; height: 100%; object-fit: cover; }
    .names-2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 7vw, 4.5rem); background: linear-gradient(135deg, #e9d5ff, #c084fc, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .clock-purple { font-family: monospace; font-size: 1.7rem; background: #00000055; display: inline-block; padding: 8px 25px; border-radius: 50px; margin: 20px 0; border: 1px solid #c084fc; }
    .countdown-2 { display: flex; gap: 20px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
    .cd-2 { background: rgba(0,0,0,0.5); padding: 12px 18px; border-radius: 30px; min-width: 80px; border: 0.5px solid #c084fc; }
    .cd-2 span { font-size: 1.8rem; font-weight: bold; color: #e9d5ff; display: block; font-family: 'Cinzel'; }
    .btn-purple { background: linear-gradient(135deg, #a855f7, #7e22ce); border: none; padding: 12px 32px; border-radius: 50px; margin: 10px; cursor: pointer; font-weight: bold; color: white; }
    .btn-purple-outline { background: transparent; border: 1px solid #c084fc; padding: 12px 32px; border-radius: 50px; color: #c084fc; cursor: pointer; }
    .map-2 { border-radius: 28px; border: 1px solid #a855f7; width: 100%; height: 240px; margin: 20px 0; }
    .diamond { position: fixed; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>
<div class="invitation-2">
  <div class="hero-2">
    <div class="glass-2">
      <i class="fas fa-crown" style="font-size: 2.5rem; color: #c084fc;"></i>
      <div class="photo-duo"><div><img src="https://randomuser.me/api/portraits/men/45.jpg" alt="Groom"></div><div><img src="https://randomuser.me/api/portraits/women/89.jpg" alt="Bride"></div></div>
      <h1 class="names-2">Samarth & Ananya</h1>
      <div class="clock-purple purple" id="liveClock2">--:--:--</div>
      <div class="countdown-2"><div class="cd-2"><span id="d2">00</span>DAYS</div><div class="cd-2"><span id="h2">00</span>HRS</div><div class="cd-2"><span id="m2">00</span>MINS</div><div class="cd-2"><span id="s2">00</span>SECS</div></div>
      <p><i class="fas fa-map-marker-alt purple"></i> Udaivilas Palace, Udaipur | 15 January 2027 | 6:00 PM</p>
      <iframe class="map-2" src="https://maps.google.com/maps?q=Udaivilas%20Palace%2C%20Udaipur&output=embed"></iframe>
      <button class="btn-purple" id="rsvp2"><i class="fas fa-envelope"></i> RSVP</button>
      <button class="btn-purple-outline" id="whats2"><i class="fab fa-whatsapp"></i> WhatsApp</button>
    </div>
  </div>
</div>
<div id="modal2" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); backdrop-filter:blur(14px); z-index:10000; align-items:center; justify-content:center;"><div style="background:#1b0f2c; border-radius:48px; padding:2rem; max-width:400px; border:1px solid #c084fc;"><h3 style="color:#c084fc;">Sapphire RSVP</h3><input type="text" id="name2" placeholder="Your Name" style="width:100%; margin:12px 0; padding:12px; background:#2a1a42; border:1px solid #c084fc; border-radius:40px; color:white;"><button id="submit2" style="background:#a855f7; border:none; padding:10px 28px; border-radius:40px;">Confirm</button><button id="close2" style="background:transparent; border:1px solid #c084fc; padding:10px 28px; border-radius:40px; color:#c084fc;">Close</button></div></div>
<script>
  const target2 = new Date(2027, 0, 15, 18, 0, 0);
  function update2(){ const now=new Date(); document.getElementById('liveClock2').innerText=now.toLocaleTimeString('en-US',{hour12:false}); let diff=target2-now; if(diff>0){ document.getElementById('d2').innerText=Math.floor(diff/864e5).toString().padStart(2,'0'); document.getElementById('h2').innerText=Math.floor((diff%864e5)/36e5).toString().padStart(2,'0'); document.getElementById('m2').innerText=Math.floor((diff%36e5)/6e4).toString().padStart(2,'0'); document.getElementById('s2').innerText=Math.floor((diff%6e4)/1e3).toString().padStart(2,'0'); } }
  setInterval(update2,1000); update2();
  setInterval(()=>{ let d=document.createElement('div'); d.classList.add('diamond'); d.innerHTML='💎'; d.style.left=Math.random()*window.innerWidth+'px'; d.style.top='-20px'; d.style.color=`rgba(168,85,247,${0.6})`; document.body.appendChild(d); gsap.to(d,{y:window.innerHeight+50,rotation:360,duration:6+Math.random()*7,onComplete:()=>d.remove()}); },800);
  gsap.fromTo('.glass-2',{scale:0.95,opacity:0},{scale:1,opacity:1,duration:1.2});
  const modal2=document.getElementById('modal2'); document.getElementById('rsvp2').onclick=()=>modal2.style.display='flex'; document.getElementById('close2').onclick=()=>modal2.style.display='none'; document.getElementById('submit2').onclick=()=>{let nm=document.getElementById('name2').value; if(nm) alert(`💜 ${nm}, your presence honors us!`); modal2.style.display='none';}; document.getElementById('whats2').onclick=()=>window.open(`https://wa.me/?text=${encodeURIComponent("💜 Royal Wedding: Samarth & Ananya at Udaivilas Palace, 15 Jan 2027. Join us! 💜")}`,'_blank');
</script>
</body>
</html>
