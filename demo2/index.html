<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Vivaah Creations | Sapphire & Velvet | Samarth & Ananya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050210; font-family: 'Montserrat', sans-serif; }
    .sapphire-card {
      max-width: 1300px;
      margin: 40px auto;
      background: radial-gradient(ellipse at 70% 30%, #1b0f3a, #03000f);
      border-radius: 60px 60px 40px 40px;
      border: 1px solid #a855f7;
      box-shadow: 0 40px 70px rgba(0,0,0,0.7);
      overflow: hidden;
    }
    .hero-sapphire {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 28px;
    }
    .glass-sapphire {
      background: rgba(25,12,55,0.7);
      backdrop-filter: blur(14px);
      border-radius: 70px 30px 70px 30px;
      padding: 3rem 2rem;
      max-width: 1000px;
      width: 100%;
      border: 1px solid #c084fc;
      text-align: center;
    }
    .purple-text { color: #c084fc; text-shadow: 0 0 6px #a855f7; }
    .photo-duo {
      display: flex;
      justify-content: center;
      gap: 35px;
      margin: 25px 0;
    }
    .photo-duo div {
      width: 140px; height: 140px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #c084fc;
      box-shadow: 0 0 30px #a855f7;
    }
    .photo-duo img { width: 100%; height: 100%; object-fit: cover; }
    .names-purple {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      background: linear-gradient(135deg, #e9d5ff, #c084fc, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .purple-clock {
      font-family: monospace;
      font-size: 1.7rem;
      background: #00000055;
      display: inline-block;
      padding: 8px 25px;
      border-radius: 50px;
      margin: 20px 0;
      border: 1px solid #c084fc;
    }
    .countdown-purple {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .cd-purple {
      background: rgba(0,0,0,0.5);
      padding: 12px 18px;
      border-radius: 30px;
      min-width: 80px;
      border: 0.5px solid #c084fc;
    }
    .cd-purple span { font-size: 1.8rem; font-weight: bold; color: #e9d5ff; display: block; font-family: 'Cinzel'; }
    .btn-purple {
      background: linear-gradient(135deg, #a855f7, #7e22ce);
      border: none;
      padding: 12px 32px;
      border-radius: 50px;
      margin: 10px;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }
    .btn-purple-outline {
      background: transparent;
      border: 1px solid #c084fc;
      padding: 12px 32px;
      border-radius: 50px;
      color: #c084fc;
      cursor: pointer;
    }
    .map-purple { border-radius: 28px; border: 1px solid #a855f7; width: 100%; height: 240px; margin: 20px 0; }
    .floating-diamond { position: fixed; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>

<div class="sapphire-card">
  <div class="hero-sapphire">
    <div class="glass-sapphire">
      <i class="fas fa-crown" style="font-size: 2.5rem; color: #c084fc;"></i>
      <div class="photo-duo">
        <div><img src="https://randomuser.me/api/portraits/men/45.jpg" alt="Groom"></div>
        <div><img src="https://randomuser.me/api/portraits/women/89.jpg" alt="Bride"></div>
      </div>
      <h1 class="names-purple">Samarth & Ananya</h1>
      <div class="purple-clock purple-text" id="purpleLiveClock">--:--:--</div>
      <div class="countdown-purple">
        <div class="cd-purple"><span id="pDays">00</span>DAYS</div>
        <div class="cd-purple"><span id="pHours">00</span>HRS</div>
        <div class="cd-purple"><span id="pMins">00</span>MINS</div>
        <div class="cd-purple"><span id="pSecs">00</span>SECS</div>
      </div>
      <p><i class="fas fa-map-marker-alt purple-text"></i> Udaivilas Palace, Udaipur | 15 January 2027 | 6:00 PM</p>
      <iframe class="map-purple" src="https://maps.google.com/maps?q=Udaivilas%20Palace%2C%20Udaipur&output=embed"></iframe>
      <button class="btn-purple" id="rsvpPurpleBtn"><i class="fas fa-envelope"></i> RSVP</button>
      <button class="btn-purple-outline" id="whatsPurpleBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
    </div>
  </div>
</div>

<div id="modalPurple" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); backdrop-filter:blur(14px); z-index:10000; align-items:center; justify-content:center;">
  <div style="background:#1b0f2c; border-radius:48px; padding:2rem; max-width:400px; border:1px solid #c084fc;">
    <h3 style="color:#c084fc;">Sapphire RSVP</h3>
    <input type="text" id="purpleName" placeholder="Your Name" style="width:100%; margin:12px 0; padding:12px; background:#2a1a42; border:1px solid #c084fc; border-radius:40px; color:white;">
    <button id="submitPurple" style="background:#a855f7; border:none; padding:10px 28px; border-radius:40px;">Confirm</button>
    <button id="closePurple" style="background:transparent; border:1px solid #c084fc; padding:10px 28px; border-radius:40px; color:#c084fc;">Close</button>
  </div>
</div>

<script>
  const targetPurple = new Date(2027, 0, 15, 18, 0, 0);
  function updatePurple(){
    const now=new Date();
    document.getElementById('purpleLiveClock').innerText=now.toLocaleTimeString('en-US',{hour12:false});
    let diff=targetPurple-now;
    if(diff>0){
      document.getElementById('pDays').innerText=Math.floor(diff/864e5).toString().padStart(2,'0');
      document.getElementById('pHours').innerText=Math.floor((diff%864e5)/36e5).toString().padStart(2,'0');
      document.getElementById('pMins').innerText=Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
      document.getElementById('pSecs').innerText=Math.floor((diff%6e4)/1e3).toString().padStart(2,'0');
    }
  }
  setInterval(updatePurple,1000); updatePurple();
  setInterval(()=>{ let d=document.createElement('div'); d.classList.add('floating-diamond'); d.innerHTML='💎'; d.style.left=Math.random()*window.innerWidth+'px'; d.style.top='-20px'; d.style.color=`rgba(168,85,247,${0.6})`; document.body.appendChild(d); gsap.to(d,{y:window.innerHeight+50,rotation:360,duration:6+Math.random()*7,onComplete:()=>d.remove()}); },800);
  gsap.fromTo('.glass-sapphire',{scale:0.95,opacity:0},{scale:1,opacity:1,duration:1.2});
  const modalP=document.getElementById('modalPurple');
  document.getElementById('rsvpPurpleBtn').onclick=()=>modalP.style.display='flex';
  document.getElementById('closePurple').onclick=()=>modalP.style.display='none';
  document.getElementById('submitPurple').onclick=()=>{let nm=document.getElementById('purpleName').value; if(nm) alert(`💜 ${nm}, your presence honors us!`); modalP.style.display='none';};
  document.getElementById('whatsPurpleBtn').onclick=()=>window.open(`https://wa.me/?text=${encodeURIComponent("💜 Royal Wedding: Samarth & Ananya at Udaivilas Palace, 15 Jan 2027. Join us! 💜")}`,'_blank');
</script>
</body>
</html>
